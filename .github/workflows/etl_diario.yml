name: ETL Diário FIDC

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 BRT (UTC-3) todos os dias
  workflow_dispatch:        # permite disparar manualmente pelo GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Python 3.11
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar pipeline ETL
        env:
          # Acesso direto à CVM. A CVM (dados.cvm.gov.br) às vezes recusa/expira a
          # conexão dos runners do GitHub — por isso o passo re-tenta abaixo.
          # (CVM_PROXY fica vazio; se um dia houver um proxy BR que NÃO bloqueie a
          #  CVM, basta definir o secret CVM_PROXY que o config.SESSION o usa.)
          CVM_PROXY: ${{ secrets.CVM_PROXY }}
        run: |
          n=0; max=4
          until python -m fidc.pipeline; do
            n=$((n+1))
            if [ "$n" -ge "$max" ]; then
              echo "::error::Pipeline falhou após $max tentativas (CVM indisponível)."
              exit 1
            fi
            espera=$((n*120))
            echo "Tentativa $n falhou (CVM provavelmente fora do ar). Aguardando ${espera}s e re-tentando..."
            sleep "$espera"
          done

      - name: Publicar parquets no HF Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os, pathlib, sys
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          base = pathlib.Path("data/processed")
          arquivos = [
              "fidc_consolidado.parquet",
              "fidc_cotas.parquet",
              "cdi_mensal.parquet",
              "ipca_mensal.parquet",
              "selic_mensal.parquet",
              "fidc_carteira.parquet",
          ]
          erros = []
          for f in arquivos:
              p = base / f
              if not p.exists():
                  print(f"AVISO: {f} não encontrado, pulando")
                  continue
              try:
                  api.upload_file(
                      path_or_fileobj=str(p),
                      path_in_repo=f,
                      repo_id="claudiormpaes/fidc-dados",
                      repo_type="dataset",
                      commit_message=f"ETL diário: {f}",
                  )
                  print(f"OK: {f}")
              except Exception as e:
                  print(f"ERRO {f}: {e}")
                  erros.append(f)
          if erros:
              print(f"Falha em {len(erros)} arquivo(s): {erros}")
              sys.exit(1)
          EOF
