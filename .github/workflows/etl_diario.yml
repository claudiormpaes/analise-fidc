name: ETL Diário FIDC

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 BRT (UTC-3) todos os dias
  workflow_dispatch:        # permite disparar manualmente pelo GitHub

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar pipeline ETL
        run: python -m fidc.pipeline

      - name: Publicar parquets no HF Dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os, pathlib, sys
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          base = pathlib.Path("data/processed")
          arquivos = [
              "fidc_consolidado.parquet",
              "fidc_cotas.parquet",
              "cdi_mensal.parquet",
              "ipca_mensal.parquet",
              "selic_mensal.parquet",
              "fidc_carteira.parquet",
          ]
          erros = []
          for f in arquivos:
              p = base / f
              if not p.exists():
                  print(f"AVISO: {f} não encontrado, pulando")
                  continue
              try:
                  api.upload_file(
                      path_or_fileobj=str(p),
                      path_in_repo=f,
                      repo_id="claudiormpaes/fidc-dados",
                      repo_type="dataset",
                      commit_message=f"ETL diário: {f}",
                  )
                  print(f"OK: {f}")
              except Exception as e:
                  print(f"ERRO {f}: {e}")
                  erros.append(f)
          if erros:
              print(f"Falha em {len(erros)} arquivo(s): {erros}")
              sys.exit(1)
          EOF

      - name: Reiniciar HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi
          HfApi(token=os.environ["HF_TOKEN"]).restart_space("claudiormpaes/analise-fidc")
          print("Space reiniciado.")
          EOF
